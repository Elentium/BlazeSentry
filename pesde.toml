name = "elentium/blazesentry"
version = "0.1.4"
description = "BlazeSentry Fork Oriented for Pure Performance"
authors = ["IAMNOTULTRA3"]
repository = "https://github.com/Elentium/BlazeSentry"
license = "APACHE-2.0"
includes = [
    "src/**/*.luau",
    ".vscode",
    ".gitignore",
    "CHANGELOG.md",
    "README.md",
    "LICENSE",
    "pesde.toml",
    "stylua.toml"
]

[target]
environment = "roblox"
lib = "src/init.luau"
build_files = ["src"]

[indices]
default = "https://github.com/pesde-pkg/index"
